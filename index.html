<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
    <title>Pomodoro</title>
  </head>
  <body>
    <h1>Pomodoro</h1>
    <div id="display">Do it!</div>
    <div>
      <button id="start-25-button">25min</button>
      <button id="start-5-button">5min</button>
      <button id="pause-button" hidden>Pause</button>
      <button id="resume-button" hidden>Resume</button>
    </div>
    <div>Notification: <span id="notification-permission"></span></div>
  </body>
</html>
